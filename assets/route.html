<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
    <title>Route Planner</title>
    <style>
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, 'Segoe UI', sans-serif; }

        /* ── Status pill ───────────────────────────── */
        #status-pill {
            display: none;
            position: absolute;
            top: 12px; left: 50%;
            -ms-transform: translateX(-50%);
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(24,24,27,0.88);
            color: #FAFAFA;
            padding: 8px 22px;
            border-radius: 22px;
            font-size: 14px;
            pointer-events: none;
            white-space: nowrap;
        }
        #status-pill.error { background: rgba(185,28,28,0.88); }
        #status-pill.loading { background: rgba(37,99,235,0.9); }

        /* ── Measure toolbox ───────────────────────── */
        #meas-tool {
            position: absolute; bottom: 56px; right: 10px; z-index: 1000;
            background: rgba(24,24,27,0.85); color: #FAFAFA;
            border-radius: 10px; padding: 8px 13px;
            display: flex; align-items: center; gap: 9px;
            cursor: grab; user-select: none; -ms-user-select: none;
        }
        #meas-handle { color: #71717A; font-size: 15px; line-height: 1; cursor: grab; }
        #meas-dist-btn, #meas-area-btn, #meas-clear-btn {
            background: none; border: none; cursor: pointer;
            font-size: 22px; padding: 0; line-height: 1; color: #FAFAFA; opacity: 0.7;
        }
        #meas-dist-btn:hover, #meas-area-btn:hover { opacity: 1; }
        #meas-dist-btn.active { opacity: 1; color: #F59E0B; }
        #meas-area-btn.active { opacity: 1; color: #A78BFA; }
        #meas-clear-btn { font-size: 18px; color: #A1A1AA; }
        #meas-clear-btn:hover { color: #FAFAFA; }
        #meas-result { font-size: 15px; color: #22C55E; white-space: nowrap; min-width: 0; font-weight: 600; }

        /* ── Hint bar ──────────────────────────────── */
        #hint {
            position: absolute;
            bottom: 28px; left: 50%;
            -ms-transform: translateX(-50%);
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(24,24,27,0.7);
            color: #D4D4D8;
            padding: 7px 20px;
            border-radius: 18px;
            font-size: 13px;
            pointer-events: none;
            white-space: nowrap;
        }

        /* ── Waypoint marker ───────────────────────── */
        .wpt-marker {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2.5px solid #FFFFFF;
            box-shadow: 0 2px 8px rgba(0,0,0,0.35);
            color: #FFFFFF;
            font-size: 11px; font-weight: 700;
            text-align: center;
            line-height: 23px;
            box-sizing: border-box;
            cursor: grab;
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLs=" crossorigin=""></script>
</head>
<body>
    <div id="map"></div>
    <div id="meas-tool" title="Drag to move">
        <span id="meas-handle">⠿</span>
        <button id="meas-dist-btn" onclick="startMeasure('dist')" title="Measure distance">📏</button>
        <button id="meas-area-btn" onclick="startMeasure('area')" title="Measure area">⬡</button>
        <span id="meas-result"></span>
        <button id="meas-clear-btn" onclick="clearMeasure()" title="Clear" style="display:none">×</button>
    </div>
    <div id="status-pill"></div>
    <div id="hint">Click on the map to add waypoints &nbsp;&middot;&nbsp; Right-click a marker to remove it</div>

    <script>
        var map = L.map('map').setView([48.8566, 2.3522], 5);

        // ── Tile layer switcher ───────────────────────────────────────────────
        var _tileLayer      = null;
        var _tileOverlay    = null;
        var _currentStyle   = 'map';
        var _tileServerPort = 0;

        var _TILES = {
            'map': {
                url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                opt: { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19 }
            },
            'relief': {
                url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
                opt: { attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM | Style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a>', maxZoom: 17 }
            },
            'satellite': {
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                opt: { attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics', maxZoom: 19 }
            },
            'hybrid': {
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                opt: { attribution: 'Tiles &copy; Esri', maxZoom: 19 },
                overlay: 'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}'
            }
        };

        function _localUrl(style) {
            return 'http://127.0.0.1:' + _tileServerPort + '/tiles/' + style + '/{z}/{x}/{y}.png';
        }

        function setTileServerPort(port) {
            _tileServerPort = parseInt(port, 10) || 0;
            if (_tileServerPort > 0) {
                _TILES['map'].url         = _localUrl('map');
                _TILES['relief'].url      = _localUrl('relief');
                _TILES['satellite'].url   = _localUrl('satellite');
                _TILES['hybrid'].url      = _localUrl('satellite');
                _TILES['hybrid'].overlay  = _localUrl('hybrid_overlay');
            }
            setTileLayer(_currentStyle);
        }

        function setTileLayer(name) {
            _currentStyle = name;
            var cfg = _TILES[name] || _TILES['map'];
            if (_tileLayer)   { map.removeLayer(_tileLayer);   _tileLayer   = null; }
            if (_tileOverlay) { map.removeLayer(_tileOverlay); _tileOverlay = null; }
            _tileLayer = L.tileLayer(cfg.url, cfg.opt).addTo(map);
            _tileLayer.bringToBack();
            if (cfg.overlay) {
                _tileOverlay = L.tileLayer(cfg.overlay, { opacity: 0.85, maxZoom: 19 }).addTo(map);
                _tileOverlay.bringToBack();
                _tileLayer.bringToBack();
            }
        }

        setTileLayer('map');

        // ── State ─────────────────────────────────────────────────────────────
        var _waypoints = [];   // [{lat, lon, marker}]
        var _routePoly = null;
        var _cbQueue   = [];

        // ── Draw-mode state ───────────────────────────────────────────────────
        var _mode       = 'foot';   // current routing mode set by Python
        var _isDrawing  = false;    // currently accumulating draw vertices
        var _drawVerts  = [];       // [[lat, lon], ...]
        var _drawPoly   = null;     // live preview polyline
        var _drawStart  = null;     // connector polyline from last waypoint to first vert

        // ── Callback queue — polled by Python every 150 ms ────────────────────
        function _callPython(action, data) {
            _cbQueue.push(action + '|' + JSON.stringify(data));
        }
        function dequeueCallback() {
            return _cbQueue.length ? _cbQueue.shift() : '';
        }

        // ── Marker factory ────────────────────────────────────────────────────
        function _markerColor(idx, total) {
            if (idx === 0)          { return '#22C55E'; }   // green  = start
            if (idx === total - 1)  { return '#EF4444'; }   // red    = end
            return '#2563EB';                               // blue   = intermediate
        }

        function _makeMarker(idx, total, lat, lon) {
            var color = _markerColor(idx, total);
            var icon  = L.divIcon({
                html: '<div class="wpt-marker" style="background:' + color + ';">' + (idx + 1) + '</div>',
                iconSize:   [28, 28],
                iconAnchor: [14, 14],
                className:  ''
            });
            var marker = L.marker([lat, lon], { icon: icon, draggable: true }).addTo(map);

            // Close-over idx via IIFE so drag/contextmenu always use correct index
            (function(i) {
                marker.on('dragend', function() {
                    var ll = marker.getLatLng();
                    _waypoints[i].lat = ll.lat;
                    _waypoints[i].lon = ll.lng;
                    _callPython('move', { idx: i, lat: ll.lat, lon: ll.lng });
                });
                marker.on('contextmenu', function(e) {
                    L.DomEvent.stopPropagation(e);
                    _callPython('remove', { idx: i });
                });
            })(idx);

            return marker;
        }

        // ── Mode switch (called by Python) ────────────────────────────────────
        function setMode(mode) {
            var prev = _mode;
            _mode = mode;
            if (prev === 'draw' && mode !== 'draw') {
                _cancelDraw();
            }
            map.getContainer().style.cursor = (mode === 'draw') ? 'crosshair' : '';
            _updateHint();
        }

        // ── Draw helpers ──────────────────────────────────────────────────────
        function _cancelDraw() {
            if (_drawPoly)  { map.removeLayer(_drawPoly);  _drawPoly  = null; }
            if (_drawStart) { map.removeLayer(_drawStart); _drawStart = null; }
            _drawVerts = [];
            _isDrawing = false;
        }

        function _finishDraw() {
            if (_drawVerts.length < 2) { _cancelDraw(); return; }
            var verts = _drawVerts.slice();
            _cancelDraw();
            _callPython('manual_finish', { verts: verts });
        }

        // ── Map click → measure vertex OR waypoint OR draw vertex ────────────
        map.on('click', function(e) {
            if (_measMode) { _measClick(e.latlng.lat, e.latlng.lng); return; }
            if (_mode === 'draw') {
                var pt = [e.latlng.lat, e.latlng.lng];
                _drawVerts.push(pt);

                if (!_isDrawing) {
                    _isDrawing = true;
                    // Connector from last existing waypoint to first drawn vertex
                    if (_waypoints.length > 0) {
                        var lw = _waypoints[_waypoints.length - 1];
                        _drawStart = L.polyline([[lw.lat, lw.lon], pt], {
                            color: '#F59E0B', weight: 2, dashArray: '4,4', opacity: 0.7
                        }).addTo(map);
                    }
                    _drawPoly = L.polyline([pt], {
                        color: '#F59E0B', weight: 3, opacity: 0.9
                    }).addTo(map);
                } else {
                    _drawPoly.addLatLng(L.latLng(pt));
                }
                _updateHint();
                return;   // do NOT create a waypoint marker
            }

            // Normal mode: provisional waypoint
            var idx    = _waypoints.length;
            var total  = idx + 1;
            var marker = _makeMarker(idx, total, e.latlng.lat, e.latlng.lng);
            _waypoints.push({ lat: e.latlng.lat, lon: e.latlng.lng, marker: marker });
            _updateHint();
            _callPython('add', { idx: idx, lat: e.latlng.lat, lon: e.latlng.lng });
        });

        // ── Right-click on map → finish measure / finish draw / no-op ───────────
        map.on('contextmenu', function(e) {
            if (_measMode && _measVerts.length >= 2) {
                L.DomEvent.stop(e); _measFinish(); return;
            }
            if (_mode === 'draw' && _isDrawing) {
                L.DomEvent.stop(e);
                // Add the right-click point as the final vertex
                _drawVerts.push([e.latlng.lat, e.latlng.lng]);
                _finishDraw();
            }
        });

        // ── Called from Python: re-render all markers with correct colours ─────
        function setWaypoints(jsonStr) {
            for (var i = 0; i < _waypoints.length; i++) {
                if (_waypoints[i].marker) { map.removeLayer(_waypoints[i].marker); }
            }
            _waypoints = [];
            var pts   = JSON.parse(jsonStr);
            var total = pts.length;
            for (var j = 0; j < total; j++) {
                var marker = _makeMarker(j, total, pts[j].lat, pts[j].lon);
                _waypoints.push({ lat: pts[j].lat, lon: pts[j].lon, marker: marker });
            }
            _updateHint();
        }

        // ── Called from Python: draw OSRM route ───────────────────────────────
        function drawRoute(jsonStr) {
            if (_routePoly) { map.removeLayer(_routePoly); _routePoly = null; }
            var coords = JSON.parse(jsonStr);
            if (!coords || coords.length < 2) { return; }
            _routePoly = L.polyline(coords, {
                color: '#22C55E', weight: 5, opacity: 0.85
            }).addTo(map);
            _routePoly.bringToBack();
            map.fitBounds(_routePoly.getBounds(), { padding: [30, 30] });
        }

        // ── Called from Python: clear everything ──────────────────────────────
        function clearAll() {
            for (var i = 0; i < _waypoints.length; i++) {
                if (_waypoints[i].marker) { map.removeLayer(_waypoints[i].marker); }
            }
            _waypoints = [];
            if (_routePoly) { map.removeLayer(_routePoly); _routePoly = null; }
            _cancelDraw();
            clearMeasure();
            _cbQueue = [];
            setStatus('', false);
            _updateHint();
        }

        // ── Status overlay ────────────────────────────────────────────────────
        function setStatus(text, isError) {
            var el = document.getElementById('status-pill');
            if (!text) { el.style.display = 'none'; return; }
            el.innerHTML  = text;
            el.className  = isError ? 'error' : 'loading';
            el.style.display = 'block';
        }

        // ── Default view (called by Python after load) ────────────────────────
        function setDefaultView(lat, lon, zoom) {
            map.setView([parseFloat(lat), parseFloat(lon)], parseInt(zoom));
        }

        // ── UI scale (called by Python when font-size setting changes) ─────────
        function setUIScale(s) {
            var ss = parseFloat(s) || 1;

            // Status pill
            var sp = document.getElementById('status-pill');
            if (sp) {
                sp.style.fontSize     = Math.round(14 * ss) + 'px';
                sp.style.padding      = Math.round(8 * ss) + 'px ' + Math.round(22 * ss) + 'px';
                sp.style.borderRadius = Math.round(22 * ss) + 'px';
            }

            // Hint bar
            var hint = document.getElementById('hint');
            if (hint) {
                hint.style.fontSize     = Math.round(13 * ss) + 'px';
                hint.style.padding      = Math.round(7 * ss) + 'px ' + Math.round(20 * ss) + 'px';
                hint.style.borderRadius = Math.round(18 * ss) + 'px';
            }

            // Measure toolbox
            var mt = document.getElementById('meas-tool');
            if (mt) {
                mt.style.padding      = Math.round(8 * ss) + 'px ' + Math.round(13 * ss) + 'px';
                mt.style.gap          = Math.round(9 * ss) + 'px';
                mt.style.borderRadius = Math.round(10 * ss) + 'px';
            }
            var mh = document.getElementById('meas-handle');
            if (mh) { mh.style.fontSize = Math.round(15 * ss) + 'px'; }
            var mdb = document.getElementById('meas-dist-btn');
            if (mdb) { mdb.style.fontSize = Math.round(22 * ss) + 'px'; }
            var mab = document.getElementById('meas-area-btn');
            if (mab) { mab.style.fontSize = Math.round(22 * ss) + 'px'; }
            var mcb = document.getElementById('meas-clear-btn');
            if (mcb) { mcb.style.fontSize = Math.round(18 * ss) + 'px'; }
            var mr = document.getElementById('meas-result');
            if (mr) { mr.style.fontSize = Math.round(15 * ss) + 'px'; }
        }

        // ── Measure toolbox — drag support ────────────────────────────────────
        (function() {
            var el = document.getElementById('meas-tool');
            var dragging = false, ox, oy, sx, sy;
            el.addEventListener('mousedown', function(e) {
                if (e.target.tagName === 'BUTTON') return;
                dragging = true;
                var r = el.getBoundingClientRect();
                ox = r.left; oy = r.top;
                sx = e.clientX; sy = e.clientY;
                el.style.bottom = ''; el.style.right = '';
                el.style.left = ox + 'px'; el.style.top = oy + 'px';
                e.preventDefault();
            });
            document.addEventListener('mousemove', function(e) {
                if (!dragging) return;
                el.style.left = (ox + e.clientX - sx) + 'px';
                el.style.top  = (oy + e.clientY - sy) + 'px';
            });
            document.addEventListener('mouseup', function() { dragging = false; });
        })();

        // ── Measurement state ─────────────────────────────────────────────────
        var _measMode   = null;   // null | 'dist' | 'area'
        var _measVerts  = [];     // [[lat, lon], ...]
        var _measLayers = [];     // Leaflet layers to remove on clear

        function startMeasure(mode) {
            clearMeasure();
            _measMode = mode;
            document.getElementById('meas-dist-btn').className = (mode === 'dist') ? 'active' : '';
            document.getElementById('meas-area-btn').className = (mode === 'area') ? 'active' : '';
            document.getElementById('meas-clear-btn').style.display = 'inline';
            document.getElementById('meas-result').innerHTML = 'Click to start';
        }

        function clearMeasure() {
            for (var i = 0; i < _measLayers.length; i++) { map.removeLayer(_measLayers[i]); }
            _measLayers = [];
            _measVerts  = [];
            _measMode   = null;
            document.getElementById('meas-dist-btn').className = '';
            document.getElementById('meas-area-btn').className = '';
            document.getElementById('meas-result').innerHTML = '';
            document.getElementById('meas-clear-btn').style.display = 'none';
        }

        function _measClick(lat, lng) {
            _measVerts.push([lat, lng]);
            _measRedraw(false);
        }

        function _measFinish() {
            if (!_measMode || _measVerts.length < 2) return;
            var closed = (_measMode === 'area' && _measVerts.length >= 3);
            _measRedraw(closed);
            document.getElementById('meas-result').innerHTML =
                closed ? _formatArea(_calcAreaM2()) : _formatDist(_totalDist());
            _measMode = null;
            document.getElementById('meas-dist-btn').className = '';
            document.getElementById('meas-area-btn').className = '';
        }

        function _measRedraw(closed) {
            for (var i = 0; i < _measLayers.length; i++) { map.removeLayer(_measLayers[i]); }
            _measLayers = [];
            if (_measVerts.length === 0) return;
            var color = (_measMode === 'area') ? '#A78BFA' : '#F59E0B';
            var coords = closed ? _measVerts.concat([_measVerts[0]]) : _measVerts.slice();
            var line = L.polyline(coords, { color: color, weight: 2.5, dashArray: '5,4', opacity: 0.9 }).addTo(map);
            _measLayers.push(line);
            if (closed) {
                var fill = L.polygon(_measVerts, { color: color, fillColor: color, fillOpacity: 0.08, weight: 0 }).addTo(map);
                _measLayers.push(fill);
            }
            for (var j = 0; j < _measVerts.length; j++) {
                var dot = L.circleMarker(_measVerts[j], {
                    radius: 4, color: color, fillColor: color, fillOpacity: 0.9, weight: 1.5
                }).addTo(map);
                _measLayers.push(dot);
            }
            if (_measVerts.length >= 2) {
                document.getElementById('meas-result').innerHTML =
                    (_measMode === 'area' && _measVerts.length >= 3)
                        ? _formatArea(_calcAreaM2())
                        : _formatDist(_totalDist());
            }
        }

        function _haversineM(a, b) {
            var R = 6371000;
            var dLat = (b[0] - a[0]) * Math.PI / 180;
            var dLon = (b[1] - a[1]) * Math.PI / 180;
            var lat1 = a[0] * Math.PI / 180, lat2 = b[0] * Math.PI / 180;
            var s = Math.sin(dLat/2)*Math.sin(dLat/2) +
                    Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s));
        }
        function _totalDist() {
            var d = 0;
            for (var i = 1; i < _measVerts.length; i++) { d += _haversineM(_measVerts[i-1], _measVerts[i]); }
            return d;
        }
        function _calcAreaM2() {
            var n = _measVerts.length, R = 6371000, sum = 0;
            for (var i = 0; i < n; i++) {
                var j  = (i + 1) % n;
                var lo1 = _measVerts[i][1] * Math.PI / 180;
                var lo2 = _measVerts[j][1] * Math.PI / 180;
                var la1 = _measVerts[i][0] * Math.PI / 180;
                var la2 = _measVerts[j][0] * Math.PI / 180;
                sum += (lo2 - lo1) * (2 + Math.sin(la1) + Math.sin(la2));
            }
            return Math.abs(sum) * R * R / 2;
        }
        function _formatDist(m)  { return m >= 1000 ? (m/1000).toFixed(2)+' km' : Math.round(m)+' m'; }
        function _formatArea(m2) { return m2 >= 1e6 ? (m2/1e6).toFixed(2)+' km²' : Math.round(m2)+' m²'; }

        // ── Python bridge ─────────────────────────────────────────────────────
        function getMapView()   { var c = map.getCenter(); return JSON.stringify({ lat: c.lat, lon: c.lng, zoom: map.getZoom() }); }
        function getMapBounds() { var b = map.getBounds(); return JSON.stringify({ north: b.getNorth(), south: b.getSouth(), east: b.getEast(), west: b.getWest(), zoom: map.getZoom() }); }

        // ── Export helpers (called by Python) ─────────────────────────────────
        function getRouteCoords() {
            if (!_routePoly) { return '[]'; }
            var ll = _routePoly.getLatLngs();
            var out = [];
            for (var i = 0; i < ll.length; i++) { out.push([ll[i].lat, ll[i].lng]); }
            return JSON.stringify(out);
        }

        // ── Hint update ───────────────────────────────────────────────────────
        function _updateHint() {
            var el = document.getElementById('hint');
            if (_mode === 'draw') {
                el.style.display = 'block';
                el.innerHTML = _isDrawing
                    ? 'Click to add vertices &nbsp;&middot;&nbsp; Right-click to finish segment'
                    : 'Draw mode &nbsp;&middot;&nbsp; Click on the map to start drawing';
            } else {
                el.style.display = _waypoints.length >= 2 ? 'none' : 'block';
                el.innerHTML = 'Click on the map to add waypoints &nbsp;&middot;&nbsp; Right-click a marker to remove it';
            }
        }
    </script>
</body>
</html>
